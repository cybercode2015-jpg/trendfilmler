<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FİLMLOBİ - FİLM LİSTESİ</title>
    <style>
        .film-kart { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; text-align: center; }
        img { width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>FİLMLOBİ</h1>
    <div id="film-kapsayici">Yükleniyor...</div>

    <script>
        async function filmleriGetir() {
            const kapsayici = document.getElementById('film-kapsayici');
            try {
                // Kendi dosyanın RAW linkini buraya net bir şekilde yazıyoruz
                const response = await fetch('https://raw.githubusercontent.com/cybercode2015-jpg/trendfilmler/main/data.json');
                
                if (!response.ok) throw new Error('Veri çekilemedi!');
                
                const filmList = await response.json();
                kapsayici.innerHTML = ''; // "Yükleniyor" yazısını sil
                
                filmList.forEach(film => {
                    const kart = document.createElement('div');
                    kart.className = 'film-kart';
                    kart.innerHTML = `
                        <img src="${film.poster}" alt="${film.baslik}">
                        <h3>${film.baslik}</h3>
                        <p>IMDb: ${film.imdb}</p>
                    `;
                    kapsayici.appendChild(kart);
                });
            } catch (hata) {
                kapsayici.innerHTML = 'Hata oluştu: ' + hata.message;
                console.error(hata);
            }
        }
        filmleriGetir();
    </script>
</body>
</html>
